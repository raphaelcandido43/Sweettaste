<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sweet Taste - Pipoca Gourmet</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Arial', sans-serif;
            background: #f5f5f5;
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
        }

        header {
            background: white;
            padding: 30px;
            border-radius: 15px;
            margin-bottom: 30px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
            text-align: center;
        }

        h1 {
            color: #667eea;
            font-size: 2.5em;
            margin-bottom: 10px;
        }

        .subtitle {
            color: #666;
            font-size: 1.1em;
        }

        .controls {
            background: white;
            padding: 20px;
            border-radius: 15px;
            margin-bottom: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
        }

        .control-group {
            margin-bottom: 15px;
        }

        .control-group label {
            display: block;
            margin-bottom: 15px;
            font-weight: bold;
            color: #333;
            font-size: 1.1em;
        }

        .packaging-options {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 15px;
            margin-bottom: 20px;
        }

        .packaging-box {
            border: 2px solid #ddd;
            border-radius: 12px;
            padding: 20px;
            text-align: center;
            cursor: pointer;
            transition: all 0.3s;
            background: white;
        }

        .packaging-box:hover {
            border-color: #667eea;
            background: #f0f4ff;
        }

        .packaging-box.active {
            border-color: #667eea;
            background: #e8f0ff;
            box-shadow: 0 4px 12px rgba(102, 126, 234, 0.3);
        }

        .packaging-box .emoji {
            font-size: 2.5em;
            margin-bottom: 10px;
            display: block;
        }

        .packaging-box .name {
            font-weight: bold;
            color: #333;
            font-size: 1em;
        }

        .control-group select,
        .control-group input {
            width: 100%;
            padding: 12px;
            border: 1px solid #ddd;
            border-radius: 8px;
            font-size: 1em;
        }

        .products {
            margin-bottom: 30px;
        }

        .section-title {
            color: #333;
            margin: 30px 0 15px 0;
            font-size: 1.3em;
            font-weight: bold;
        }

        .section-title.tradicional {
            color: #4a90e2;
            border-left: 5px solid #4a90e2;
            padding-left: 15px;
        }

        .section-title.premium {
            color: #b19cd9;
            border-left: 5px solid #b19cd9;
            padding-left: 15px;
        }

        .products-section {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 20px;
            margin-bottom: 20px;
        }

        .product {
            background: white;
            padding: 20px;
            border-radius: 15px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
            text-align: center;
        }

        .product h3 {
            color: #667eea;
            margin-bottom: 15px;
            font-size: 1.3em;
        }

        .sizes {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .size-btn {
            background: #f0f0f0;
            border: 2px solid #ddd;
            padding: 10px 15px;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.3s;
            color: #333;
            font-weight: bold;
            font-size: 0.95em;
        }

        .size-btn:hover {
            background: #667eea;
            color: white;
            border-color: #667eea;
        }

        .cart {
            background: white;
            padding: 25px;
            border-radius: 15px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
            margin-bottom: 20px;
        }

        .cart h2 {
            color: #667eea;
            margin-bottom: 20px;
            font-size: 1.5em;
        }

        .coupon-section {
            background: #f9f9f9;
            padding: 15px;
            border-radius: 8px;
            margin-bottom: 20px;
        }

        .coupon-section h3 {
            color: #333;
            margin-bottom: 10px;
        }

        .coupon-input {
            display: flex;
            gap: 10px;
            margin-bottom: 10px;
        }

        .coupon-input input {
            flex: 1;
        }

        .coupon-input button {
            flex: 0;
            background: #667eea;
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 8px;
            cursor: pointer;
            font-weight: bold;
        }

        .coupon-input button:hover {
            background: #764ba2;
        }

        .cart-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 12px;
            border-bottom: 1px solid #eee;
            background: #f9f9f9;
            margin-bottom: 8px;
            border-radius: 5px;
        }

        .cart-item button {
            background: #ff4444;
            color: white;
            border: none;
            padding: 5px 10px;
            border-radius: 5px;
            cursor: pointer;
            font-size: 0.85em;
        }

        .cart-item button:hover {
            background: #cc0000;
        }

        .total-section {
            background: #f0f0f0;
            padding: 15px;
            border-radius: 8px;
            margin: 20px 0;
        }

        .total-line {
            display: flex;
            justify-content: space-between;
            margin-bottom: 8px;
            font-size: 1.1em;
        }

        .total-line.grand-total {
            font-weight: bold;
            color: #667eea;
            font-size: 1.3em;
            border-top: 2px solid #ddd;
            padding-top: 10px;
            margin-top: 10px;
        }

        .empty-cart {
            text-align: center;
            color: #999;
            padding: 30px;
            font-size: 1.1em;
        }

        .alert {
            padding: 12px;
            margin: 10px 0;
            border-radius: 8px;
            font-weight: bold;
        }

        .alert-success {
            background: #d4edda;
            color: #155724;
            border: 1px solid #c3e6cb;
        }

        .alert-error {
            background: #f8d7da;
            color: #721c24;
            border: 1px solid #f5c6cb;
        }

        .whatsapp-btn {
            width: 100%;
            background: #25D366;
            color: white;
            border: none;
            padding: 15px;
            font-size: 1.2em;
            border-radius: 8px;
            cursor: pointer;
            font-weight: bold;
            margin-top: 20px;
        }

        .whatsapp-btn:hover {
            background: #1ea952;
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>🍿 Sweet Taste</h1>
            <p class="subtitle">Pipoca Gourmet Premium</p>
        </header>

        <div class="controls">
            <div class="control-group">
                <label>Escolha a Embalagem:</label>
                <div class="packaging-options">
                    <div class="packaging-box active" id="pkg-cone" onclick="selecionarEmbalagem('cone')">
                        <span class="emoji">🍿</span>
                        <div class="name">Saco Cone</div>
                    </div>
                    <div class="packaging-box" id="pkg-kraft" onclick="selecionarEmbalagem('kraft')">
                        <span class="emoji">📦</span>
                        <div class="name">Zip Lock</div>
                    </div>
                    <div class="packaging-box" id="pkg-bolha" onclick="selecionarEmbalagem('bolha')">
                        <span class="emoji">🥤</span>
                        <div class="name">Copo Bolha</div>
                    </div>
                    <div class="packaging-box" id="pkg-pacote" onclick="selecionarEmbalagem('pacote')">
                        <span class="emoji">📦</span>
                        <div class="name">Pacote 1kg</div>
                    </div>
                </div>
            </div>
        </div>

        <div class="products" id="products"></div>

        <div class="cart">
            <h2>🛒 Seu Pedido</h2>
            
            <div class="coupon-section">
                <h3>Cupom de Desconto</h3>
                <div class="coupon-input">
                    <input type="text" id="couponCode" placeholder="Digite seu cupom">
                    <button onclick="aplicarCupom()">Aplicar</button>
                </div>
                <div id="couponStatus"></div>
            </div>

            <div id="cartItems"></div>
            
            <div class="total-section">
                <div class="total-line">
                    <span>Subtotal:</span>
                    <span>R$ <span id="subtotal">0.00</span></span>
                </div>
                <div class="total-line" id="discountLine" style="display: none;">
                    <span>Desconto:</span>
                    <span>-R$ <span id="discount">0.00</span></span>
                </div>
                <div class="total-line grand-total">
                    <span>Total:</span>
                    <span>R$ <span id="total">0.00</span></span>
                </div>
            </div>

            <div class="control-group">
                <label>Data de Entrega (mínimo 15 dias):</label>
                <input type="date" id="deliveryDate">
            </div>

            <div class="control-group">
                <label>Forma de Pagamento:</label>
                <select id="paymentMethod">
                    <option value="PIX">PIX</option>
                    <option value="Cartão de Crédito">Cartão de Crédito</option>
                    <option value="Cartão de Débito">Cartão de Débito</option>
                    <option value="Dinheiro">Dinheiro</option>
                </select>
            </div>

            <div class="control-group">
                <label>Observações:</label>
                <input type="text" id="observations" placeholder="">
            </div>

            <button class="whatsapp-btn" onclick="enviarWhatsApp()">📱 Enviar Pedido via WhatsApp</button>
        </div>
    </div>

    <script>
        const COUPONS = [
            { code: 'SWEET5', discount: 5 },
            { code: 'SWEET10', discount: 10 }
        ];

        const SIZES_CONFIG = {
            cone: ['50g', '80g'],
            kraft: ['40g', '70g', '90g'],
            bolha: ['150ml', '180ml', '200ml'],
            pacote: ['1kg']
        };

        const PRICES_CONFIG = {
            cone: {
                tradicionais: { '50g': 6, '80g': 8 },
                premium: { '50g': 8, '80g': 9 }
            },
            kraft: {
                tradicionais: { '40g': 6, '70g': 7, '90g': 8 },
                premium: { '40g': 7, '70g': 8, '90g': 10 }
            },
            bolha: {
                tradicionais: { '150ml': 7, '180ml': 8, '200ml': 10 },
                premium: { '150ml': 9, '180ml': 10, '200ml': 11 }
            },
            pacote: {
                tradicionais: { '1kg': 90 },
                premium: { '1kg': 90 }
            }
        };

        const PACKAGING_NAMES = {
            cone: 'Saco Cone',
            kraft: 'Kraft',
            bolha: 'Copo Bolha',
            pacote: 'Pacote'
        };

        const PRODUCTS = {
            tradicionais: [
                { id: 'leite-ninho', name: 'Leite Ninho', emoji: '🤍' },
                { id: 'choconinho', name: 'Choconinho', emoji: '🤎' },
                { id: 'nesquik', name: 'Nesquik', emoji: '💜' },
                { id: 'chocolate', name: 'Chocolate', emoji: '🍫' }
            ],
            premium: [
                { id: 'pacoca', name: 'Paçoca', emoji: '🟫' },
                { id: 'ovomaltine', name: 'Ovomaltine', emoji: '✨' },
                { id: 'maracuja', name: 'Maracujá', emoji: '🟡' },
                { id: 'churros', name: 'Churros', emoji: '🟤' }
            ]
        };

        let carrinho = [];
        let cupomAplicado = null;
        let selectedPackaging = 'cone';

        function setMinDeliveryDate() {
            const today = new Date();
            const minDate = new Date(today.getTime() + 15 * 24 * 60 * 60 * 1000);
            document.getElementById('deliveryDate').min = minDate.toISOString().split('T')[0];
            document.getElementById('deliveryDate').value = minDate.toISOString().split('T')[0];
        }

        function selecionarEmbalagem(tipo) {
            selectedPackaging = tipo;
            
            // Remover classe active de todos
            document.querySelectorAll('.packaging-box').forEach(box => {
                box.classList.remove('active');
            });
            
            // Adicionar classe active ao selecionado
            document.getElementById('pkg-' + tipo).classList.add('active');
            
            renderizarProdutos();
        }

        function mudarEmbalagem() {
            // Função mantida para compatibilidade
        }

        function renderizarProdutos() {
            const container = document.getElementById('products');
            let html = '';
            
            // Sabores Tradicionais
            html += '<h2 class="section-title tradicional">Sabores Tradicionais</h2>';
            html += '<div class="products-section">';
            PRODUCTS.tradicionais.forEach(p => {
                const sizes = SIZES_CONFIG[selectedPackaging];
                html += '<div class="product">';
                html += '<h3>' + p.emoji + ' ' + p.name + '</h3>';
                html += '<div class="sizes">';
                
                sizes.forEach(size => {
                    const preco = PRICES_CONFIG[selectedPackaging]['tradicionais'][size];
                    html += '<button class="size-btn" onclick="adicionarAoCarrinho(\'' + p.id + '\', \'' + p.name + '\', \'' + size + '\', \'' + p.emoji + '\')">'
                    html += size + ' - R$ ' + preco.toFixed(2);
                    html += '</button>';
                });
                
                html += '</div></div>';
            });
            html += '</div>';
            
            // Sabores Premium
            html += '<h2 class="section-title premium">Sabores Premium</h2>';
            html += '<div class="products-section">';
            PRODUCTS.premium.forEach(p => {
                const sizes = SIZES_CONFIG[selectedPackaging];
                html += '<div class="product">';
                html += '<h3>' + p.emoji + ' ' + p.name + '</h3>';
                html += '<div class="sizes">';
                
                sizes.forEach(size => {
                    const preco = PRICES_CONFIG[selectedPackaging]['premium'][size];
                    html += '<button class="size-btn" onclick="adicionarAoCarrinho(\'' + p.id + '\', \'' + p.name + '\', \'' + size + '\', \'' + p.emoji + '\')">';
                    html += size + ' - R$ ' + preco.toFixed(2);
                    html += '</button>';
                });
                
                html += '</div></div>';
            });
            html += '</div>';
            
            container.innerHTML = html;
        }        function adicionarAoCarrinho(id, nome, tamanho, emoji) {
            // Determinar tipo de sabor
            let tipo = 'tradicionais';
            if (PRODUCTS.premium.some(p => p.id === id)) {
                tipo = 'premium';
            }
            
            const preco = PRICES_CONFIG[selectedPackaging][tipo][tamanho];
            const packaging = PACKAGING_NAMES[selectedPackaging];
            const itemId = id + '-' + tamanho + '-' + selectedPackaging;
            
            const item = carrinho.find(i => i.itemId === itemId);
            
            if (item) {
                item.quantidade++;
            } else {
                carrinho.push({
                    itemId: itemId,
                    id: id,
                    nome: nome,
                    emoji: emoji,
                    size: tamanho,
                    preco: preco,
                    packaging: packaging,
                    quantidade: 1
                });
            }
            atualizarCarrinho();
        }

        function removerDoCarrinho(itemId) {
            carrinho = carrinho.filter(i => i.itemId !== itemId);
            atualizarCarrinho();
        }

        function atualizarCarrinho() {
            const container = document.getElementById('cartItems');
            
            if (carrinho.length === 0) {
                container.innerHTML = '<div class="empty-cart">Nenhum item no carrinho</div>';
                document.getElementById('subtotal').textContent = '0.00';
                document.getElementById('total').textContent = '0.00';
                document.getElementById('discount').textContent = '0.00';
                document.getElementById('discountLine').style.display = 'none';
                return;
            }

            let html = '';
            let subtotal = 0;
            
            carrinho.forEach(item => {
                const itemTotal = item.preco * item.quantidade;
                subtotal += itemTotal;
                html += '<div class="cart-item">';
                html += '<span>' + item.quantidade + 'x ' + item.emoji + ' ' + item.nome + ' (' + item.packaging + ') – ' + item.size + '</span>';
                html += '<span>R$ ' + itemTotal.toFixed(2) + '</span>';
                html += '<button onclick="removerDoCarrinho(\'' + item.itemId + '\')">Remover</button>';
                html += '</div>';
            });
            
            container.innerHTML = html;

            const desconto = cupomAplicado ? (subtotal * cupomAplicado.discount) / 100 : 0;
            const total = subtotal - desconto;

            document.getElementById('subtotal').textContent = subtotal.toFixed(2);
            document.getElementById('discount').textContent = desconto.toFixed(2);
            document.getElementById('total').textContent = total.toFixed(2);
            
            if (desconto > 0) {
                document.getElementById('discountLine').style.display = 'flex';
            } else {
                document.getElementById('discountLine').style.display = 'none';
            }
        }

        function aplicarCupom() {
            const codigo = document.getElementById('couponCode').value.toUpperCase();
            const cupom = COUPONS.find(c => c.code === codigo);
            
            if (cupom) {
                cupomAplicado = cupom;
                document.getElementById('couponStatus').innerHTML = '<div class="alert alert-success">✓ Cupom ' + cupom.code + ' aplicado com ' + cupom.discount + '% de desconto!</div>';
                document.getElementById('couponCode').value = '';
                atualizarCarrinho();
            } else {
                document.getElementById('couponStatus').innerHTML = '<div class="alert alert-error">✗ Cupom inválido</div>';
            }
        }

        function enviarWhatsApp() {
            if (carrinho.length === 0) {
                alert('Adicione produtos ao carrinho!');
                return;
            }

            const deliveryDate = document.getElementById('deliveryDate').value;
            if (!deliveryDate) {
                alert('Selecione uma data de entrega!');
                return;
            }

            const formattedDate = new Date(deliveryDate).toLocaleDateString('pt-BR');
            const paymentMethod = document.getElementById('paymentMethod').value;
            const observations = document.getElementById('observations').value;

            let itensText = '';
            let subtotal = 0;
            
            carrinho.forEach(item => {
                const itemTotal = item.preco * item.quantidade;
                subtotal += itemTotal;
                itensText += '• ' + item.quantidade + 'x ' + item.nome + ' (' + item.packaging + ') – ' + item.size + ' → R$ ' + itemTotal.toFixed(2).replace('.', ',') + '\n';
            });

            const desconto = cupomAplicado ? (subtotal * cupomAplicado.discount) / 100 : 0;
            const total = subtotal - desconto;

            let message = '_*Pedido via site - SWEET TASTE*_\n_Olá! Gostaria de fazer um pedido de pipoca gourmet._\n\n*Itens do Pedido:*\n' + itensText;
            
            if (cupomAplicado) {
                message += '\n*Cupom aplicado:* ' + cupomAplicado.code + '\n*Desconto (' + cupomAplicado.discount + '%):* -R$ ' + desconto.toFixed(2).replace('.', ',') + '\n';
            }

            message += '*Total do Pedido:* R$ ' + total.toFixed(2).replace('.', ',') + '\n\n*Data de Entrega:* ' + formattedDate + '\n\n*Forma de Pagamento:* ' + paymentMethod;
            
            if (observations) {
                message += '\n\n*Observações:*\n' + observations;
            }

            message += '\n\n_Fico no aguardo da confirmação do pedido, obrigado(a)!_';

            const numero = '5521979755580';
            const url = 'https://wa.me/' + numero + '?text=' + encodeURIComponent(message);
            window.open(url, '_blank');
        }

        // Inicializar
        setMinDeliveryDate();
        renderizarProdutos();
    </script>
</body>
</html>
