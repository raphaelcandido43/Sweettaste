<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sweet Taste - Pipoca Gourmet</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Poppins', sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
        }

        header {
            background: white;
            padding: 20px;
            border-radius: 10px;
            margin-bottom: 30px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
            text-align: center;
        }

        h1 {
            color: #667eea;
            font-size: 2.5em;
            margin-bottom: 10px;
        }

        .products {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }

        .product {
            background: white;
            padding: 20px;
            border-radius: 10px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
            text-align: center;
            transition: transform 0.3s;
        }

        .product:hover {
            transform: translateY(-10px);
        }

        .product h3 {
            color: #667eea;
            margin-bottom: 10px;
        }

        .price {
            font-size: 1.5em;
            color: #764ba2;
            font-weight: bold;
            margin: 10px 0;
        }

        button {
            background: #667eea;
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 5px;
            cursor: pointer;
            font-size: 1em;
            transition: background 0.3s;
        }

        button:hover {
            background: #764ba2;
        }

        .cart {
            background: white;
            padding: 20px;
            border-radius: 10px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
            margin-bottom: 20px;
        }

        .cart h2 {
            color: #667eea;
            margin-bottom: 15px;
        }

        .cart-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 10px;
            border-bottom: 1px solid #eee;
        }

        .total {
            font-size: 1.5em;
            font-weight: bold;
            color: #667eea;
            margin-top: 15px;
            text-align: right;
        }

        .whatsapp-btn {
            width: 100%;
            background: #25D366;
            padding: 15px;
            font-size: 1.2em;
            margin-top: 20px;
        }

        .whatsapp-btn:hover {
            background: #1ea952;
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>🍿 Sweet Taste</h1>
            <p>Pipoca Gourmet Premium</p>
        </header>

        <div class="products" id="products"></div>

        <div class="cart">
            <h2>🛒 Seu Pedido</h2>
            <div id="cartItems"></div>
            <div class="total">Total: R$ <span id="total">0.00</span></div>
            <button class="whatsapp-btn" onclick="enviarWhatsApp()">📱 Enviar Pedido via WhatsApp</button>
        </div>
    </div>

    <script>
        const produtos = [
            { id: 1, nome: 'Leite Ninho', preco: 8.00 },
            { id: 2, nome: 'Choconinho', preco: 8.00 },
            { id: 3, nome: 'Nesquik', preco: 8.00 },
            { id: 4, nome: 'Churros', preco: 8.00 },
            { id: 5, nome: 'Maracujá', preco: 8.00 },
            { id: 6, nome: 'Morango', preco: 8.00 }
        ];

        let carrinho = [];

        function renderizarProdutos() {
            const container = document.getElementById('products');
            container.innerHTML = produtos.map(p => `
                <div class="product">
                    <h3>${p.nome}</h3>
                    <div class="price">R$ ${p.preco.toFixed(2)}</div>
                    <button onclick="adicionarAoCarrinho(${p.id}, '${p.nome}', ${p.preco})">
                        Adicionar ao Carrinho
                    </button>
                </div>
            `).join('');
        }

        function adicionarAoCarrinho(id, nome, preco) {
            const item = carrinho.find(i => i.id === id);
            if (item) {
                item.quantidade++;
            } else {
                carrinho.push({ id, nome, preco, quantidade: 1 });
            }
            atualizarCarrinho();
        }

        function atualizarCarrinho() {
            const container = document.getElementById('cartItems');
            const total = carrinho.reduce((sum, item) => sum + (item.preco * item.quantidade), 0);
            
            container.innerHTML = carrinho.map(item => `
                <div class="cart-item">
                    <span>${item.quantidade}x ${item.nome}</span>
                    <span>R$ ${(item.preco * item.quantidade).toFixed(2)}</span>
                </div>
            `).join('');

            document.getElementById('total').textContent = total.toFixed(2);
        }

        function enviarWhatsApp() {
            if (carrinho.length === 0) {
                alert('Adicione produtos ao carrinho!');
                return;
            }

            let mensagem = '*🍿 PEDIDO SWEET TASTE 🍿*\n\n';
            mensagem += '*Itens do Pedido:*\n';
            
            let total = 0;
            carrinho.forEach(item => {
                const subtotal = item.preco * item.quantidade;
                total += subtotal;
                mensagem += `• ${item.quantidade}x ${item.nome} - R$ ${subtotal.toFixed(2)}\n`;
            });

            mensagem += `\n*Total: R$ ${total.toFixed(2)}*\n`;
            mensagem += '\nPor favor, confirme o pedido!';

            const numero = '5521979755580';
            const url = `https://wa.me/${numero}?text=${encodeURIComponent(mensagem)}`;
            window.open(url, '_blank');
        }

        // Inicializar
        renderizarProdutos();
    </script>
</body>
</html>
