                { id: 'ovomaltine', name: 'Ovomaltine', emoji: '✨', image: 'https://d2xsxph8kpxj0f.cloudfront.net/310519663299151704/VwESV7TtC8drfEj6E7hyi4/pipoca-ovomaltine-Z48HEx5W3X2oKYd5hGhJCW.webp', description: 'Sabor único e sofisticado do Ovomaltine, uma experiência premium' },
                { id: 'maracuja', name: 'Maracujá', emoji: '🟡', image: 'https://d2xsxph8kpxj0f.cloudfront.net/310519663299151704/VwESV7TtC8drfEj6E7hyi4/pipoca-maracuja-HPhT7wXqtFQCE9rTdGDAxu.webp', description: 'Tropical e refrescante, com o sabor vibrante do maracujá' },
                { id: 'churros', name: 'Churros', emoji: '🟤', image: 'https://d2xsxph8kpxj0f.cloudfront.net/310519663299151704/VwESV7TtC8drfEj6E7hyi4/pipoca-churros-ATfLRPAd4iCbbyYTFcd3JV.webp', description: 'Doce e saborosa, com o gosto irresistível de churros' }
            ]
        };

        let carrinho = [];
        let cupomAplicado = null;
        let selectedPackaging = 'cone';
        let selectedPayment = 'Dinheiro';

        function setMinDeliveryDate() {
            const today = new Date();
            const minDate = new Date(today.getTime() + 15 * 24 * 60 * 60 * 1000);
            document.getElementById('deliveryDate').min = minDate.toISOString().split('T')[0];
            document.getElementById('deliveryDate').value = '';
        }

        function selecionarEmbalagem(tipo) {
            selectedPackaging = tipo;
            
            // Remover classe active de todos
            document.querySelectorAll('.packaging-box').forEach(box => {
                box.classList.remove('active');
            });
            
            // Adicionar classe active ao selecionado
            document.getElementById('pkg-' + tipo).classList.add('active');
            
            renderizarProdutos();
        }

        function mudarEmbalagem() {
            // Função mantida para compatibilidade
        }

        function renderizarProdutos() {
            const container = document.getElementById('products');
            let html = '';
            
            // Sabores Tradicionais
            html += '<h2 class="section-title tradicional">Sabores Tradicionais</h2>';
            html += '<div class="products-section tradicional">';
            PRODUCTS.tradicionais.forEach(p => {
                const sizes = SIZES_CONFIG[selectedPackaging];
                html += '<div class="product">';
                html += '<img src="' + p.image + '" alt="' + p.name + '" class="product-image">';
                html += '<h3>' + p.name + '</h3>';
                html += '<p class="product-description">' + p.description + '</p>';
                html += '<div class="sizes">';
                
                sizes.forEach(size => {
                    const preco = PRICES_CONFIG[selectedPackaging]['tradicionais'][size];
                    html += '<button class="size-btn" onclick="adicionarAoCarrinho(\'' + p.id + '\', \'' + p.name + '\', \'' + size + '\', \'' + p.emoji + '\')">'
                    html += size + ' - R$ ' + preco.toFixed(2);
                    html += '</button>';
                });
                
                html += '</div></div>';
            });
            html += '</div>';
            
            // Sabores Premium
            html += '<h2 class="section-title premium">Sabores Premium</h2>';
            html += '<div class="products-section premium">';
            PRODUCTS.premium.forEach(p => {
                const sizes = SIZES_CONFIG[selectedPackaging];
                html += '<div class="product">';
                html += '<img src="' + p.image + '" alt="' + p.name + '" class="product-image">';
                html += '<h3>' + p.name + '</h3>';
                html += '<p class="product-description">' + p.description + '</p>';
                html += '<div class="sizes">';
                
                sizes.forEach(size => {
                    const preco = PRICES_CONFIG[selectedPackaging]['premium'][size];
                    html += '<button class="size-btn" onclick="adicionarAoCarrinho(\'' + p.id + '\', \'' + p.name + '\', \'' + size + '\', \'' + p.emoji + '\')">'
                    html += size + ' - R$ ' + preco.toFixed(2);
                    html += '</button>';
                });
                
                html += '</div></div>';
            });
            html += '</div>';
            
            container.innerHTML = html;
        }

        function adicionarAoCarrinho(id, nome, tamanho, emoji) {
            // Animar o botao clicado com pulse
            const clickedButton = event.target;
            clickedButton.classList.remove('pulse-animation');
            void clickedButton.offsetWidth; // Trigger reflow
            clickedButton.classList.add('pulse-animation');
            
            // Determinar tipo de sabor
            let tipo = 'tradicionais';
            if (PRODUCTS.premium.some(p => p.id === id)) {
                tipo = 'premium';
            }
            
            const preco = PRICES_CONFIG[selectedPackaging][tipo][tamanho];
            const packaging = PACKAGING_NAMES[selectedPackaging];
            const itemId = id + '-' + tamanho + '-' + selectedPackaging;
            
            const item = carrinho.find(i => i.itemId === itemId);
            
            if (item) {
                item.quantidade++;
            } else {
                carrinho.push({
                    itemId: itemId,
                    id: id,
                    nome: nome,
                    emoji: emoji,
                    size: tamanho,
                    preco: preco,
                    packaging: packaging,
                    quantidade: 1
                });
            }
            
            atualizarCarrinho();
        }

        function alterarQuantidade(itemId, delta) {
            const item = carrinho.find(i => i.itemId === itemId);
            if (item) {
                item.quantidade += delta;
                if (item.quantidade <= 0) {
                    removerDoCarrinho(itemId);
                } else {
                    atualizarCarrinho();
                }
            }
        }

        function removerDoCarrinho(itemId) {
            carrinho = carrinho.filter(i => i.itemId !== itemId);
            atualizarCarrinho();
        }

        function scrollToCart() {
            document.getElementById('cartSection').scrollIntoView({ behavior: 'smooth' });
        }

        function atualizarCarrinho() {
            const container = document.getElementById('cartItems');
            const badge = document.getElementById('cartBadge');
            
            // Atualizar badge com número de itens
            const totalItens = carrinho.reduce((sum, item) => sum + item.quantidade, 0);
            if (totalItens > 0) {
                badge.textContent = totalItens;
                badge.style.display = 'flex';
            } else {
                badge.style.display = 'none';
            }
            
            if (carrinho.length === 0) {
                container.innerHTML = '<div class="empty-cart">🛒 Seu carrinho está vazio<br><br>Adicione alguns sabores deliciosos para começar!</div>';
                document.getElementById('subtotal').textContent = '0.00';
                document.getElementById('total').textContent = '0.00';
                document.getElementById('discount').textContent = '0.00';
                document.getElementById('discountLine').style.display = 'none';
                return;
            }

            let html = '';
            let subtotal = 0;
            
            carrinho.forEach(item => {
                const itemTotal = item.preco * item.quantidade;
                subtotal += itemTotal;
                html += '<div class="cart-item">';
                html += '<div class="cart-item-info">';
                html += '<span class="cart-item-name">' + item.nome + ' (' + item.packaging + ') – ' + item.size + '</span>';
                html += '<span class="cart-item-price">R$ ' + itemTotal.toFixed(2) + '</span>';
                html += '</div>';
                html += '<div class="cart-item-controls">';
                html += '<button class="qty-btn" onclick="alterarQuantidade(\'' + item.itemId + '\', -1)">-</button>';
                html += '<span class="qty-display">' + item.quantidade + '</span>';
                html += '<button class="qty-btn" onclick="alterarQuantidade(\'' + item.itemId + '\', 1)">+</button>';
                html += '<button class="remove-btn" onclick="removerDoCarrinho(\'' + item.itemId + '\')">✕</button>';
                html += '</div>';
                html += '</div>';
            });
            
            container.innerHTML = html;

            const desconto = cupomAplicado ? (subtotal * cupomAplicado.discount) / 100 : 0;
            const total = subtotal - desconto;

            document.getElementById('subtotal').textContent = subtotal.toFixed(2);
            document.getElementById('discount').textContent = desconto.toFixed(2);
            document.getElementById('total').textContent = total.toFixed(2);
            
            if (desconto > 0) {
                document.getElementById('discountLine').style.display = 'flex';
            } else {
                document.getElementById('discountLine').style.display = 'none';
            }
        }

        function aplicarCupom() {
            const codigo = document.getElementById('couponCode').value.toUpperCase();
            const cupom = COUPONS.find(c => c.code === codigo);
            
            if (cupom) {
                cupomAplicado = cupom;
                document.getElementById('couponStatus').innerHTML = '<div class="alert alert-success">✓ Cupom ' + cupom.code + ' aplicado com ' + cupom.discount + '% de desconto! <button onclick="removerCupom()" style="background: #ff4444; color: white; border: none; padding: 4px 8px; border-radius: 4px; cursor: pointer; margin-left: 10px;">✕</button></div>';
                document.getElementById('couponCode').value = '';
                atualizarCarrinho();
            } else {
                document.getElementById('couponStatus').innerHTML = '<div class="alert alert-error">✗ Cupom inválido</div>';
            }
        }

        function removerCupom() {
            cupomAplicado = null;
            document.getElementById('couponStatus').innerHTML = '';
            document.getElementById('couponCode').value = '';
            atualizarCarrinho();
        }

        function selecionarPagamento(tipo) {
            selectedPayment = tipo;
            
            // Remover classe active de todos
            document.querySelectorAll('.payment-box').forEach(box => {
                box.classList.remove('active');
            });
            
            // Adicionar classe active ao selecionado
            let paymentId = 'payment-' + tipo.toLowerCase();
            if (tipo === 'Cartão') {
                paymentId = 'payment-cartao';
            }
            document.getElementById(paymentId).classList.add('active');
        }

        function enviarWhatsApp() {
            if (carrinho.length === 0) {
                alert('Adicione produtos ao carrinho!');
                return;
            }

            const deliveryDate = document.getElementById('deliveryDate').value;
            if (!deliveryDate) {
                alert('Selecione uma data de entrega!');
                return;
            }

            const formattedDate = new Date(deliveryDate).toLocaleDateString('pt-BR');

            let itensText = '';
            let subtotal = 0;
            
            carrinho.forEach(item => {
                const itemTotal = item.preco * item.quantidade;
                subtotal += itemTotal;
                itensText += '• ' + item.quantidade + 'x ' + item.nome + ' (' + item.packaging + ') – ' + item.size + ' → R$ ' + itemTotal.toFixed(2).replace('.', ',') + '\n';
            });

            const desconto = cupomAplicado ? (subtotal * cupomAplicado.discount) / 100 : 0;
            const total = subtotal - desconto;

            let message = '_*Pedido via site - SWEET TASTE*_\n_Olá! Gostaria de fazer um pedido de pipoca gourmet._\n\n*Itens do Pedido:*\n' + itensText;
            
            if (cupomAplicado) {
                message += '\n*Cupom aplicado:* ' + cupomAplicado.code + '\n*Desconto (' + cupomAplicado.discount + '%):* -R$ ' + desconto.toFixed(2).replace('.', ',') + '\n';
            }

            message += '*Total do Pedido:* R$ ' + total.toFixed(2).replace('.', ',') + '\n\n*Data de Entrega:* ' + formattedDate + '\n\n*Forma de Pagamento:* ' + selectedPayment;
            message += '\n\n_Fico no aguardo da confirmação do pedido, obrigado(a)!_';

            const numero = '5521979755580';
            const url = 'https://wa.me/' + numero + '?text=' + encodeURIComponent(message);
            window.open(url, '_blank');
        }

        // Inicializar
        setMinDeliveryDate();
        renderizarProdutos();
        selecionarPagamento('Dinheiro');
        atualizarCarrinho();
    </script>
</body>
</html>
